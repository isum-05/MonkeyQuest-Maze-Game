<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rectangular Maze with Sprite</title>
<style>
  body { margin:0; background:#111; display:flex; justify-content:center; align-items:center; height:100vh; }
  canvas { background:#222; display:block; }
</style>
</head>
<body>
<canvas id="mazeCanvas" width="800" height="800"></canvas>

<script>
// ---------------- Maze Canvas ----------------
const canvas = document.getElementById("mazeCanvas");
const ctx = canvas.getContext("2d");

const ROWS = 10;   // maze rows
const COLS = 10;   // maze columns
const CELL_SIZE = 60;

// ---------------- Sprite Sheet ----------------
const playerImage = new Image();
playerImage.src = 'image/spriteSheet.png';
const spriteWidth = 64;
const spriteHeight = 64;
let gameFrame = 0;
const staggerFrames = 7;

const spriteAnimations = [];
const animationStates = [
    { name:"front", frames:10 },
    { name:"side_right", frames:12 },
    { name:"side_left", frames:10 },
    { name:"back", frames:8 },
    { name:"roll", frames:6 },
    { name:"jump", frames:15 },
];
animationStates.forEach((state,index)=>{
    let frames = { loc:[] };
    for(let j=0;j<state.frames;j++){
        frames.loc.push({x:j*spriteWidth, y:index*spriteHeight});
    }
    spriteAnimations[state.name] = frames;
});

// ---------------- Maze Class ----------------
class RectMaze {
    constructor(rows,cols){
        this.rows = rows;
        this.cols = cols;
        this.grid = [];
        this.stack = [];
        this.player = {r:0, c:0};
        this.exit = {r:rows-1,c:cols-1};
        this.won = false;
        this.lastMove = "idle";
        this.idleAnim = "roll";

        // Initialize grid
        for(let r=0;r<rows;r++){
            let row=[];
            for(let c=0;c<cols;c++){
                row.push({top:true,right:true,bottom:true,left:true,visited:false});
            }
            this.grid.push(row);
        }

        this.generateMaze();
    }

    generateMaze(){
        let current = {r:0,c:0};
        this.grid[0][0].visited=true;
        this.stack.push(current);

        while(this.stack.length>0){
            let {r,c} = current;
            let neighbors = [];

            // check neighbors
            if(r>0 && !this.grid[r-1][c].visited) neighbors.push({r:r-1,c:c,dir:"top"});
            if(r<this.rows-1 && !this.grid[r+1][c].visited) neighbors.push({r:r+1,c:c,dir:"bottom"});
            if(c>0 && !this.grid[r][c-1].visited) neighbors.push({r:r,c:c-1,dir:"left"});
            if(c<this.cols-1 && !this.grid[r][c+1].visited) neighbors.push({r:r,c:c+1,dir:"right"});

            if(neighbors.length>0){
                let next = neighbors[Math.floor(Math.random()*neighbors.length)];
                let nr = next.r, nc=next.c;

                // remove walls
                if(next.dir==="top"){ this.grid[r][c].top=false; this.grid[nr][nc].bottom=false; }
                if(next.dir==="bottom"){ this.grid[r][c].bottom=false; this.grid[nr][nc].top=false; }
                if(next.dir==="left"){ this.grid[r][c].left=false; this.grid[nr][nc].right=false; }
                if(next.dir==="right"){ this.grid[r][c].right=false; this.grid[nr][nc].left=false; }

                this.grid[nr][nc].visited=true;
                this.stack.push({r:nr,c:nc});
                current = {r:nr,c:nc};
            } else {
                current = this.stack.pop();
            }
        }
    }

    drawMaze(){
        ctx.strokeStyle="white";
        ctx.lineWidth=3;
        for(let r=0;r<this.rows;r++){
            for(let c=0;c<this.cols;c++){
                let x=c*CELL_SIZE;
                let y=r*CELL_SIZE;
                let cell=this.grid[r][c];
                if(cell.top){ ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+CELL_SIZE,y); ctx.stroke();}
                if(cell.right){ ctx.beginPath(); ctx.moveTo(x+CELL_SIZE,y); ctx.lineTo(x+CELL_SIZE,y+CELL_SIZE); ctx.stroke();}
                if(cell.bottom){ ctx.beginPath(); ctx.moveTo(x+CELL_SIZE,y+CELL_SIZE); ctx.lineTo(x+CELL_SIZE+0,y+CELL_SIZE); ctx.stroke();}
                if(cell.left){ ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+CELL_SIZE); ctx.stroke();}
            }
        }
        // mark exit
        ctx.fillStyle="green";
        ctx.fillRect(this.exit.c*CELL_SIZE+CELL_SIZE/4, this.exit.r*CELL_SIZE+CELL_SIZE/4, CELL_SIZE/2, CELL_SIZE/2);
    }

    drawPlayer(){
        let x = this.player.c*CELL_SIZE + CELL_SIZE/2 -15;
        let y = this.player.r*CELL_SIZE + CELL_SIZE/2 -15;

        let animName;
        if(this.lastMove==="left") animName="side_left";
        else if(this.lastMove==="right") animName="side_right";
        else if(this.lastMove==="up") animName="back";
        else if(this.lastMove==="down") animName="front";
        else animName = this.idleAnim;

        let frames = spriteAnimations[animName].loc;
        let position = Math.floor(gameFrame/staggerFrames)%frames.length;
        let frameX = frames[position].x;
        let frameY = frames[position].y;

        ctx.drawImage(playerImage, frameX, frameY, spriteWidth, spriteHeight, x, y, 30, 30);
        gameFrame++;

        if(this.lastMove==="idle" && position===frames.length-1){
            this.idleAnim = (this.idleAnim==="roll") ? "jump" : "roll";
        }
    }

    movePlayer(direction){
        if(this.won) return;
        let r=this.player.r, c=this.player.c;
        let cell=this.grid[r][c];
        let moved=false;

        if(direction==="up" && !cell.top){ this.player.r--; moved=true; }
        if(direction==="down" && !cell.bottom){ this.player.r++; moved=true; }
        if(direction==="left" && !cell.left){ this.player.c--; moved=true; }
        if(direction==="right" && !cell.right){ this.player.c++; moved=true; }

        if(moved) this.lastMove = direction; else this.lastMove="idle";

        if(this.player.r===this.exit.r && this.player.c===this.exit.c){
            this.won=true;
            alert("You escaped!");
        }
    }
}

// ---------------- Initialize Maze ----------------
const maze = new RectMaze(ROWS,COLS);

// ---------------- Animation Loop ----------------
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    maze.drawMaze();
    maze.drawPlayer();
    requestAnimationFrame(animate);
}

// ---------------- Key Events ----------------
document.addEventListener("keydown",(e)=>{
    const moves = {ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right"};
    if(moves[e.key]){
        e.preventDefault();
        maze.movePlayer(moves[e.key]);
    }
});

playerImage.onload = animate;
</script>
</body>
</html>
