<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkeyQuest</title>
    <link rel="shortcut icon" href="img/Favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style_1.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="logo-image">
                <img src="img/logo2.png" alt="MonkeyQuest Logo">
            </div>
            <div class="popup-section"></div>
        </div>
        <div class="right-section">
            <div class="Monkey-message-section">
                <div class="text-box" id="monkeyText">

                </div>
            </div>
            <div class="play-dashboard">
                <button class="play"><img src="img/playImg.png" alt="play"></button>
            </div>
        </div>
    </div>
</body>
<script>
function monkeySpeak() {
    fetch("https://icanhazdadjoke.com/", {
        headers: { "Accept": "application/json" }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("monkeyText").innerText = data.joke;
    });
}

monkeySpeak(); // first message immediately
setInterval(monkeySpeak, 5000);
</script>
</html>
